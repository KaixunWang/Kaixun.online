worker_processes  auto;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;
  client_max_body_size 25m;

  upstream next_app {
    server web:3000;
  }

  # HTTP：Let's Encrypt 验证 + 跳转 HTTPS
  server {
    listen 80;
    server_name kaixun.online www.kaixun.online;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl http2;
    server_name kaixun.online www.kaixun.online;

    ssl_certificate     /etc/letsencrypt/live/kaixun.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaixun.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
      proxy_pass         http://next_app;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
