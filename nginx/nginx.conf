worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout 65;
  gzip            on;
  gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

  # HTTP：Let's Encrypt 验证 + 跳转 HTTPS
  server {
    listen 80;
    server_name kaixun.online www.kaixun.online;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS：静态站点
  server {
    listen 443 ssl http2;
    server_name kaixun.online www.kaixun.online;

    ssl_certificate     /etc/letsencrypt/live/kaixun.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaixun.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root  /var/www/kaixun-site/dist;
    index index.html;

    location / {
      try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(css|js|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
      expires 7d;
      add_header Cache-Control "public, immutable";
    }
  }
}
